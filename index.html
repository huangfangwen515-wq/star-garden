<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思维宇宙 Pro</title>

<style>
body {
    margin:0;
    background:#050510;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#sky {
    width:100vw;
    height:100vh;
    position:relative;
}

.star {
    position:absolute;
    border-radius:50%;
    animation:breathe 3s infinite;
    cursor:pointer;
}

@keyframes breathe {
    0%,100% {opacity:0.5; transform:scale(0.9);}
    50% {opacity:1; transform:scale(1.1);}
}

#panel {
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;
}

input,textarea {
    background:#111;
    color:white;
    border:1px solid #333;
    padding:8px;
    border-radius:6px;
}

button {
    margin-top:5px;
}
</style>
</head>

<body>

<div id="sky"></div>

<div id="panel">
<input id="cat" placeholder="分类"><br>
<textarea id="content" placeholder="记录"></textarea><br>
<button onclick="add()">添加</button>
<br><br>
<input id="search" placeholder="搜索..." oninput="search()">
<div id="results"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('universe')||'{}');
let els = {};
let running = true;

function save(){
    localStorage.setItem('universe',JSON.stringify(data));
}

function createStar(cat,s,i){
    const el=document.createElement('div');
    el.className='star';

    const size=6+Math.log(s.content.length+1)*2;

    Object.assign(el.style,{
        width:size+'px',
        height:size+'px',
        left:s.x+'px',
        top:s.y+'px',
        background:data[cat].color,
        boxShadow:`0 0 ${size*3}px ${data[cat].color}`
    });

    el.onclick=()=>{
        if(confirm(s.content+"\n\n删除？")){
            deleteStar(cat,i);
        }
    };

    sky.appendChild(el);
    return el;
}

function init(){
    for(const cat in data){
        els[cat]=[];
        data[cat].stars.forEach((s,i)=>{
            els[cat].push(createStar(cat,s,i));
        });
    }
}

function add(){
    const catVal=cat.value.trim();
    const con=content.value.trim();
    if(!catVal||!con) return;

    if(!data[catVal]){
        data[catVal]={
            centroid:{
                x:Math.random()*innerWidth,
                y:Math.random()*innerHeight
            },
            color:`hsl(${Math.random()*360},70%,70%)`,
            stars:[]
        };
    }

    const d=data[catVal];

    const s={
        x:d.centroid.x+(Math.random()-0.5)*40,
        y:d.centroid.y+(Math.random()-0.5)*40,
        vx:(Math.random()-0.5)*1.5,
        vy:(Math.random()-0.5)*1.5,
        content:con,
        time:Date.now()
    };

    d.stars.push(s);

    if(!els[catVal]) els[catVal]=[];
    els[catVal].push(createStar(catVal,s,d.stars.length-1));

    save();
}

function deleteStar(cat,i){
    data[cat].stars.splice(i,1);
    els[cat][i].remove();
    els[cat].splice(i,1);

    if(data[cat].stars.length===0){
        delete data[cat];
        delete els[cat];
    }

    save();
}

function loop(){
    if(!running) return;

    const friction=0.97;
    const gravity=0.0015;

    for(const cat in data){
        const d=data[cat];

        d.stars.forEach((s,i)=>{
            const dx=d.centroid.x-s.x;
            const dy=d.centroid.y-s.y;

            s.vx+=dx*gravity;
            s.vy+=dy*gravity;

            s.vx*=friction;
            s.vy*=friction;

            s.x+=s.vx;
            s.y+=s.vy;

            if(s.x<0||s.x>innerWidth){
                s.vx*=-0.7;
            }

            if(s.y<0||s.y>innerHeight){
                s.vy*=-0.7;
            }

            const el=els[cat][i];
            if(el){
                el.style.left=s.x+'px';
                el.style.top=s.y+'px';
            }
        });
    }

    requestAnimationFrame(loop);
}

function search(){
    const q=search.value.toLowerCase();
    results.innerHTML='';

    let all=[];

    for(const cat in data){
        data[cat].stars.forEach(s=>{
            if(s.content.toLowerCase().includes(q)){
                all.push({...s,cat});
            }
        });
    }

    all.sort((a,b)=>b.time-a.time);

    all.slice(0,20).forEach(s=>{
        const div=document.createElement('div');
        div.innerText = `[${s.cat}] ` + s.content;
        results.appendChild(div);
    });
}

init();
loop();
</script>

</body>
</html>
