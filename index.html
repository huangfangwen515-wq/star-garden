<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的灵感宇宙 - 稳定版</title>
    <style>
        :root { --bg-color: #050510; --accent-blue: #4a90e2; --danger-red: #ff4d4d; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        #sky { position: relative; width: 100vw; height: 100vh; }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .star { 
            position: absolute; border-radius: 50%; cursor: pointer; z-index: 10;
            animation: breathe var(--speed) infinite ease-in-out;
            animation-delay: var(--delay);
            will-change: transform, opacity; /* 性能优化 */
        }

        /* 按钮与弹窗保持之前的高级感设计 */
        #addBtn { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; cursor: pointer; z-index: 100; backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 20, 0.98); padding: 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; width: 88%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; backdrop-filter: blur(5px); }
        #insightList { max-height: 280px; overflow-y: auto; margin: 15px 0; }
        .insight-item { background: rgba(255,255,255,0.04); padding: 15px; margin-bottom: 12px; border-radius: 14px; position: relative; border-left: 4px solid var(--accent-blue); }
        .edit-area { width: 100%; background: transparent; border: none; color: #ccc; font-size: 14px; line-height: 1.6; resize: none; outline: none; }
        .item-tools { position: absolute; right: 10px; top: 12px; display: flex; gap: 12px; }
        .tool-icon { cursor: pointer; font-size: 12px; opacity: 0.4; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-submit { flex: 2; padding: 14px; background: var(--accent-blue); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-close { flex: 1; padding: 14px; background: rgba(255,255,255,0.08); border: none; color: white; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sky"></div>
    <button id="addBtn" onclick="openNewDomainModal()">✨ 记录新领域</button>
    <div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

    <div class="modal" id="starModal">
        <h2 id="modalTitle" style="margin-top:0;">星系探索</h2>
        <div id="insightList"></div>
        <textarea id="appendContent" placeholder="追加新的感悟..."></textarea>
        <div class="btn-group">
            <button class="btn-submit" onclick="submitAppend()">融入星辰</button>
            <button class="btn-close" onclick="closeModals()">关闭</button>
        </div>
    </div>

    <div class="modal" id="newDomainModal">
        <h2 style="margin-top:0;">开启新星系</h2>
        <input type="text" id="newCategory" placeholder="领域名称">
        <textarea id="newContent" placeholder="记录第一道灵感光芒..."></textarea>
        <div class="btn-group">
            <button class="btn-submit" onclick="submitNewDomain()">点亮</button>
            <button class="btn-close" onclick="closeModals()">取消</button>
        </div>
    </div>

    <script>
        // 1. 初始化数据，确保从本地存储安全读取
        let universeData = {};
        try {
            const saved = localStorage.getItem('myStarryUniverse');
            if (saved) universeData = JSON.parse(saved);
        } catch (e) {
            console.error("数据读取失败", e);
            universeData = {};
        }

        let starElements = {};
        let currentViewingCategory = "";
        const sky = document.getElementById('sky');

        // 2. 网页加载完成后执行初始化
        window.onload = () => {
            initUniverse();
            requestAnimationFrame(simulationLoop);
        };

        function openNewDomainModal() { 
            document.getElementById('overlay').style.display = 'block'; 
            document.getElementById('newDomainModal').style.display = 'block'; 
        }
        
        function closeModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function submitNewDomain() {
            const cat = document.getElementById('newCategory').value.trim();
            const con = document.getElementById('newContent').value.trim();
            if(!cat || !con) return;
            addEntry(cat, con);
            closeModals();
        }

        function submitAppend() {
            const con = document.getElementById('appendContent').value.trim();
            if(!con) return;
            addEntry(currentViewingCategory, con);
            openStarModal(currentViewingCategory);
            document.getElementById('appendContent').value = '';
        }

        function addEntry(category, content) {
            if (!universeData[category]) {
                universeData[category] = { 
                    centroid: { x: window.innerWidth/2, y: window.innerHeight/2 }, 
                    color: `hsl(${Math.random()*360}, 70%, 75%)`, 
                    stars: [] 
                };
            }
            const newStar = { 
                x: universeData[category].centroid.x + (Math.random()-0.5)*20, 
                y: universeData[category].centroid.y + (Math.random()-0.5)*20, 
                vx: 0, vy: 0, 
                content: content, 
                date: new Date().toLocaleString(),
                id: Date.now()
            };
            universeData[category].stars.push(newStar);
            saveData();
            initUniverse(); // 重新同步 DOM
        }

        function deleteEntry(cat, starId) {
            if(!confirm("确定要让这颗星星湮灭吗？")) return;
            universeData[cat].stars = universeData[cat].stars.filter(s => s.id !== starId);
            if(universeData[cat].stars.length === 0) delete universeData[cat];
            saveData();
            if(!universeData[cat]) closeModals(); else openStarModal(cat);
            initUniverse();
        }

        function updateEntry(cat, starId, newVal) {
            const s = universeData[cat].stars.find(s => s.id === starId);
            if(s) {
                s.content = newVal;
                saveData();
                initUniverse(); 
            }
        }

        function saveData() {
            localStorage.setItem('myStarryUniverse', JSON.stringify(universeData));
        }

        function initUniverse() {
            sky.innerHTML = '';
            starElements = {};
            for (const cat in universeData) {
                starElements[cat] = [];
                universeData[cat].stars.forEach((s, i) => {
                    const el = document.createElement('div');
                    el.className = 'star';
                    const textPower = Math.min(s.content.length, 100);
                    const size = 4 + (textPower / 10);
                    el.style.width = size + 'px'; 
                    el.style.height = size + 'px';
                    el.style.backgroundColor = universeData[cat].color;
                    el.style.boxShadow = `0 0 ${size*4}px ${size/2}px ${universeData[cat].color}`;
                    el.style.setProperty('--speed', (2 + Math.random() * 3) + 's');
                    el.style.setProperty('--delay', (Math.random() * 2) + 's');
                    el.onclick = (e) => { e.stopPropagation(); openStarModal(cat); };
                    sky.appendChild(el);
                    starElements[cat][i] = el;
                });
            }
        }

        function openStarModal(cat) {
            currentViewingCategory = cat;
            const data = universeData[cat];
            document.getElementById('modalTitle').innerText = `✨ ${cat}`;
            const listDiv = document.getElementById('insightList');
            listDiv.innerHTML = '';
            [...data.stars].reverse().forEach((s) => {
                const item = document.createElement('div');
                item.className = 'insight-item';
                item.innerHTML = `
                    <div class="insight-date">${s.date}</div>
                    <div class="item-tools">
                        <span class="tool-icon delete-icon" onclick="deleteEntry('${cat}', ${s.id})">✕</span>
                    </div>
                    <textarea class="edit-area" onchange="updateEntry('${cat}', ${s.id}, this.value)">${s.content}</textarea>
                `;
                listDiv.appendChild(item);
            });
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('starModal').style.display = 'block';
        }

        // 物理模拟增加边界检查
        function simulationLoop() {
            const friction = 0.96, gravity = 0.005;
            for (const cat in universeData) {
                const d = universeData[cat];
                // 确保中心点在屏幕内
                if (isNaN(d.centroid.x)) d.centroid.x = window.innerWidth/2;
                if (isNaN(d.centroid.y)) d.centroid.y = window.innerHeight/2;

                d.stars.forEach((s, i) => {
                    const dx = d.centroid.x - s.x;
                    const dy = d.centroid.y - s.y;
                    
                    s.vx = (s.vx + dx * gravity) * friction;
                    s.vy = (s.vy + dy * gravity) * friction;
                    s.x += s.vx;
                    s.y += s.vy;

                    // 核心修复：如果星星跑出屏幕，强制拉回
                    if (s.x < 0 || s.x > window.innerWidth || isNaN(s.x)) s.x = d.centroid.x;
                    if (s.y < 0 || s.y > window.innerHeight || isNaN(s.y)) s.y = d.centroid.y;

                    const el = starElements[cat] ? starElements[cat][i] : null;
                    if(el) {
                        el.style.left = s.x + 'px';
                        el.style.top = s.y + 'px';
                    }
                });
            }
            requestAnimationFrame(simulationLoop);
        }
    </script>
</body>
</html>
