<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的灵感宇宙 - 最终防御版</title>
    <style>
        :root { --bg-color: #050510; --accent-blue: #4a90e2; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #sky { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #050510 100%); }
        
        /* 呼吸动画：移除了位移，只保留透明度和缩放，防止物理冲突 */
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .star { 
            position: absolute; border-radius: 50%; cursor: pointer; z-index: 10;
            animation: breathe var(--speed) infinite ease-in-out;
            animation-delay: var(--delay);
            /* 居中偏移由代码逻辑处理 */
        }

        /* UI 保持一致 */
        #addBtn { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; z-index: 100; backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 20, 0.98); padding: 25px; border-radius: 20px; z-index: 1000; width: 85%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; }
        .insight-item { background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 10px; border-radius: 10px; border-left: 3px solid var(--accent-blue); position: relative; }
        textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-submit { flex: 2; padding: 12px; background: var(--accent-blue); border: none; color: white; border-radius: 8px; font-weight: bold; }
        .btn-close { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="sky"></div>
    <button id="addBtn" onclick="openModal('newDomainModal')">✨ 记录感悟</button>
    <div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

    <div class="modal" id="starModal">
        <h2 id="modalTitle" style="margin-top:0">星系</h2>
        <div id="insightList" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
        <textarea id="appendContent" placeholder="在此追加感悟..."></textarea>
        <div class="btn-group">
            <button class="btn-submit" onclick="submitAppend()">保存</button>
            <button class="btn-close" onclick="closeModals()">关闭</button>
        </div>
    </div>

    <div class="modal" id="newDomainModal">
        <h2 style="margin-top:0">新星系</h2>
        <input type="text" id="newCategory" placeholder="领域" style="width:100%; margin-bottom:10px; padding:10px; box-sizing:border-box; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px;">
        <textarea id="newContent" placeholder="内容..."></textarea>
        <div class="btn-group">
            <button class="btn-submit" onclick="submitNewDomain()">开启</button>
            <button class="btn-close" onclick="closeModals()">取消</button>
        </div>
    </div>

    <script>
        let universeData = {};
        let starElements = {};
        let currentCat = "";
        let isSimulating = false;

        // 启动流程：先读数据，再绘图，最后启动模拟
        window.onload = () => {
            const saved = localStorage.getItem('myStarryUniverse');
            if (saved) universeData = JSON.parse(saved);
            initUniverse();
            setTimeout(() => { isSimulating = true; simulationLoop(); }, 500); 
        };

        function initUniverse() {
            const sky = document.getElementById('sky');
            sky.innerHTML = '';
            starElements = {};
            for (const cat in universeData) {
                starElements[cat] = [];
                universeData[cat].stars.forEach((s, i) => {
                    const el = document.createElement('div');
                    el.className = 'star';
                    const size = 5 + Math.min(s.content.length / 5, 10);
                    Object.assign(el.style, {
                        width: size + 'px', height: size + 'px',
                        backgroundColor: universeData[cat].color,
                        boxShadow: `0 0 ${size*3}px ${universeData[cat].color}`,
                        left: (s.x || window.innerWidth/2) + 'px',
                        top: (s.y || window.innerHeight/2) + 'px'
                    });
                    el.style.setProperty('--speed', (2 + Math.random()*2) + 's');
                    el.style.setProperty('--delay', Math.random() + 's');
                    el.onclick = (e) => { e.stopPropagation(); openStarModal(cat); };
                    sky.appendChild(el);
                    starElements[cat][i] = el;
                });
            }
        }

        function openModal(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }

        function closeModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function submitNewDomain() {
            const cat = document.getElementById('newCategory').value.trim();
            const con = document.getElementById('newContent').value.trim();
            if(!cat || !con) return;
            if(!universeData[cat]) universeData[cat] = { centroid: {x: window.innerWidth/2, y: window.innerHeight/2}, color: `hsl(${Math.random()*360},70%,75%)`, stars: [] };
            addEntry(cat, con);
            closeModals();
        }

        function submitAppend() {
            const con = document.getElementById('appendContent').value.trim();
            if(con) { addEntry(currentCat, con); openStarModal(currentCat); document.getElementById('appendContent').value = ''; }
        }

        function addEntry(cat, con) {
            const s = { 
                x: universeData[cat].centroid.x, y: universeData[cat].centroid.y, 
                vx: 0, vy: 0, content: con, date: new Date().toLocaleString(), id: Date.now() 
            };
            universeData[cat].stars.push(s);
            localStorage.setItem('myStarryUniverse', JSON.stringify(universeData));
            initUniverse();
        }

        function openStarModal(cat) {
            currentCat = cat;
            document.getElementById('modalTitle').innerText = cat;
            const list = document.getElementById('insightList');
            list.innerHTML = '';
            [...universeData[cat].stars].reverse().forEach(s => {
                const item = document.createElement('div');
                item.className = 'insight-item';
                item.innerHTML = `<small style="color:#666">${s.date}</small><div style="margin-top:5px">${s.content}</div>`;
                list.appendChild(item);
            });
            openModal('starModal');
        }

        function simulationLoop() {
            if(!isSimulating) return;
            const friction = 0.94; // 增加阻力
            const gravity = 0.004; // 减小引力系数
            const maxSpeed = 3;    // ⚠️ 物理核心：硬性限制最大速度

            for (const cat in universeData) {
                const d = universeData[cat];
                d.stars.forEach((s, i) => {
                    const dx = d.centroid.x - s.x;
                    const dy = d.centroid.y - s.y;
                    
                    // 计算加速度并限制
                    s.vx = (s.vx + dx * gravity) * friction;
                    s.vy = (s.vy + dy * gravity) * friction;

                    // 限制速度，防止瞬移
                    s.vx = Math.max(-maxSpeed, Math.min(maxSpeed, s.vx));
                    s.vy = Math.max(-maxSpeed, Math.min(maxSpeed, s.vy));

                    s.x += s.vx;
                    s.y += s.vy;

                    // 边界保护：如果出了屏幕，立刻拉回
                    if (s.x < 0 || s.x > window.innerWidth) { s.x = d.centroid.x; s.vx = 0; }
                    if (s.y < 0 || s.y > window.innerHeight) { s.y = d.centroid.y; s.vy = 0; }

                    const el = starElements[cat] ? starElements[cat][i] : null;
                    if(el) {
                        el.style.left = s.x + 'px';
                        el.style.top = s.y + 'px';
                    }
                });
            }
            requestAnimationFrame(simulationLoop);
        }
    </script>
</body>
</html>
