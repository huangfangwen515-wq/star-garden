<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定版终极宇宙</title>

<style>
:root { --bg-color: #050510; --accent-blue: #4a90e2; }

body {
    margin: 0;
    background: var(--bg-color);
    color: white;
    font-family: sans-serif;
    overflow: hidden;
}

#sky {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: radial-gradient(circle at center, #0a0a1a, #050510);
}

@keyframes breathe {
    0%,100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
}

.star {
    position: absolute;
    border-radius: 50%;
    animation: breathe var(--speed) infinite ease-in-out;
    cursor: pointer;
}

#addBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 15px 25px;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.modal {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:20px;
    border-radius:10px;
    width:300px;
    z-index:10;
}
</style>
</head>

<body>

<div id="sky"></div>
<button id="addBtn">✨ 记录</button>

<div class="modal" id="modal">
<input id="cat" placeholder="分类"><br><br>
<textarea id="content" placeholder="写点什么"></textarea><br><br>
<button onclick="submit()">保存</button>
<button onclick="closeModal()">关闭</button>
</div>

<script>
let universeData = {};
let starElements = {};
let isSimulating = false;

window.onload = () => {
    const saved = localStorage.getItem('universe');
    if(saved) universeData = JSON.parse(saved);

    initUniverse();

    setTimeout(()=>{
        isSimulating = true;
        simulationLoop();
    },300);
};

function initUniverse(){
    for(const cat in universeData){
        starElements[cat] = [];

        universeData[cat].stars.forEach((s,i)=>{
            const el = createStar(cat,s,i);
            starElements[cat].push(el);
        });
    }
}

function createStar(cat,s,i){
    const el = document.createElement('div');
    el.className='star';

    const size = 6 + Math.log(s.content.length+1)*2;

    Object.assign(el.style,{
        width:size+'px',
        height:size+'px',
        left:s.x+'px',
        top:s.y+'px',
        background:universeData[cat].color,
        boxShadow:`0 0 ${size*3}px ${universeData[cat].color}`
    });

    el.style.setProperty('--speed',2+Math.random()*2+'s');

    el.onclick = (e)=>{
        e.stopPropagation();
        alert(s.content);
    };

    document.getElementById('sky').appendChild(el);

    return el;
}

function submit(){
    const cat = document.getElementById('cat').value.trim();
    const con = document.getElementById('content').value.trim();
    if(!cat || !con) return;

    if(!universeData[cat]){
        universeData[cat]={
            centroid:{
                x:Math.random()*window.innerWidth,
                y:Math.random()*window.innerHeight
            },
            color:`hsl(${Math.random()*360},70%,75%)`,
            stars:[]
        };
    }

    const spread = 40;

    const s={
        x:universeData[cat].centroid.x+(Math.random()-0.5)*spread,
        y:universeData[cat].centroid.y+(Math.random()-0.5)*spread,
        vx:(Math.random()-0.5)*1.5,
        vy:(Math.random()-0.5)*1.5,
        content:con
    };

    universeData[cat].stars.push(s);

    const el = createStar(cat,s);
    if(!starElements[cat]) starElements[cat]=[];
    starElements[cat].push(el);

    localStorage.setItem('universe',JSON.stringify(universeData));

    closeModal();
}

function simulationLoop(){
    if(!isSimulating) return;

    const friction=0.97;
    const gravity=0.0015;
    const maxSpeed=2.5;

    for(const cat in universeData){
        const d=universeData[cat];

        d.stars.forEach((s,i)=>{

            const dx=d.centroid.x-s.x;
            const dy=d.centroid.y-s.y;

            s.vx+=dx*gravity;
            s.vy+=dy*gravity;

            s.vx*=friction;
            s.vy*=friction;

            s.vx=Math.max(-maxSpeed,Math.min(maxSpeed,s.vx));
            s.vy=Math.max(-maxSpeed,Math.min(maxSpeed,s.vy));

            s.x+=s.vx;
            s.y+=s.vy;

            if(s.x<0||s.x>window.innerWidth){
                s.vx*=-0.7;
                s.x=Math.max(0,Math.min(window.innerWidth,s.x));
            }

            if(s.y<0||s.y>window.innerHeight){
                s.vy*=-0.7;
                s.y=Math.max(0,Math.min(window.innerHeight,s.y));
            }

            const el=starElements[cat][i];
            if(el){
                el.style.left=s.x+'px';
                el.style.top=s.y+'px';
            }
        });
    }

    requestAnimationFrame(simulationLoop);
}

document.getElementById('addBtn').onclick=()=>{
    document.getElementById('modal').style.display='block';
};

function closeModal(){
    document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
